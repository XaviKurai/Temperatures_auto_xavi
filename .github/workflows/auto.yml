name: Daily Temperature Collector

on:
  schedule:
    - cron: '59 22 * * *'  # 22:59 UTC = 23:59 CET (hivern)
  workflow_dispatch:        # permet execució manual

jobs:
  collect-temperatures:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run temperature script
        run: python temperatura.py

      - name: Commit and push JSON file
        run: |
          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add temp_*.json
          git commit -m "Add temperatures $(date +'%Y-%m-%d')" || echo 'No changes'
          git push
